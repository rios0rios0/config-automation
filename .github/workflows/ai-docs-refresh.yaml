name: 'AI Assistant Docs Refresh'

on:
  schedule:
    # Weekly on Mondays at 07:00 UTC (one hour after the compliance audit to spread load).
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target a single repo (optional, defaults to all non-fork non-archived).'
        required: false
        type: 'string'

concurrency:
  group: 'ai-docs-refresh'
  cancel-in-progress: false

jobs:
  discover:
    name: 'Enumerate target repos'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    env:
      HARDEN_OWNER: 'rios0rios0'
    outputs:
      repos: ${{ steps.build-matrix.outputs.repos }}
      count: ${{ steps.build-matrix.outputs.count }}
    steps:
      - name: 'Checkout fleet-maintenance'
        uses: 'actions/checkout@v6'

      - name: 'Set up Python'
        uses: 'actions/setup-python@v6'
        with:
          python-version: '3.12'

      - name: 'Build matrix'
        id: 'build-matrix'
        env:
          # CLAUDE_MD_REFRESH_TOKEN is the fine-grained PAT owned by this workflow.
          # Falls back to COMPLIANCE_AUDIT_TOKEN (shared read-only PAT) and finally to
          # the ephemeral GITHUB_TOKEN, which can access the current repo per its
          # permissions but generally cannot read metadata for other private repos.
          # Scoped to this step only so the PAT isn't exposed to checkout/setup steps.
          GH_TOKEN: ${{ secrets.CLAUDE_MD_REFRESH_TOKEN || secrets.COMPLIANCE_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
          REPO_INPUT: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          if [ -n "${REPO_INPUT}" ]; then
            # Single-repo override for workflow_dispatch testing.
            default_branch=$(gh api "/repos/${HARDEN_OWNER}/${REPO_INPUT}" --jq '.default_branch')
            repos=$(python3 -c 'import json,sys; print(json.dumps([{"name": sys.argv[1], "default_branch": sys.argv[2]}]))' "${REPO_INPUT}" "${default_branch}")
          else
            repos=$(python3 scripts/harden_repos.py --list-json)
          fi
          count=$(printf '%s' "${repos}" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')
          {
            echo "repos=${repos}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"
          echo "Discovered ${count} target repo(s)."

  refresh:
    name: 'Refresh ${{ matrix.repo.name }}'
    needs: 'discover'
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
    strategy:
      fail-fast: false
      # Serial matrix execution (max-parallel: 1) so Anthropic's API sees a
      # steady single-request drip instead of bursts. A weekly run has room
      # to spend ~9 h iterating through ~60 repos; a parallel burst chews
      # through the per-minute rate limit and amplifies the cost of the
      # permission-denial loop that each no-drift repo incurs.
      max-parallel: 1
      matrix:
        repo: ${{ fromJSON(needs.discover.outputs.repos) }}
    steps:
      - name: 'Checkout fleet-maintenance (for prompt)'
        uses: 'actions/checkout@v6'

      - name: 'Load refresh prompt from fleet-maintenance'
        id: 'load-prompt'
        run: |
          set -euo pipefail
          # Read the prompt from the self-checkout into $GITHUB_OUTPUT.
          # The next step (target-repo checkout) will overwrite the workspace,
          # but the prompt value lives in the step output so it survives.
          {
            echo 'prompt<<AI_DOCS_PROMPT_EOF'
            cat scripts/refresh_ai_docs_prompt.md
            echo 'AI_DOCS_PROMPT_EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: 'Checkout target repo'
        uses: 'actions/checkout@v6'
        with:
          repository: 'rios0rios0/${{ matrix.repo.name }}'
          ref: '${{ matrix.repo.default_branch }}'
          token: ${{ secrets.CLAUDE_MD_REFRESH_TOKEN }}
          fetch-depth: 0

      - name: 'Run Claude Code to refresh AI assistant docs'
        uses: 'anthropics/claude-code-action@v1'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Tool permissions locked down to exactly what the refresh prompt
          # needs: read the repo, and edit/create the two guidance files plus
          # the CHANGELOG (so Claude can record what it changed, per the prompt
          # rule). Without this allowlist, telemetry showed ~30 `permission_denials_count`
          # per run because the action allows Claude to probe many tools but the
          # default harness denies most of them, which burned turns and API
          # spend on every no-drift no-op. See `scripts/refresh_ai_docs_prompt.md`
          # for the rule that matches this allowlist.
          claude_args: '--model claude-opus-4-6 --allowedTools "Read,Grep,Glob,Edit(/CLAUDE.md),Edit(/.github/copilot-instructions.md),Edit(/CHANGELOG.md),Write(/CLAUDE.md),Write(/.github/copilot-instructions.md),Write(/CHANGELOG.md)"'
          prompt: ${{ steps.load-prompt.outputs.prompt }}

      - name: 'Detect drift and open PR if needed'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_MD_REFRESH_TOKEN }}
          TARGET_REPO: 'rios0rios0/${{ matrix.repo.name }}'
          TARGET_DEFAULT_BRANCH: '${{ matrix.repo.default_branch }}'
          BRANCH: 'chore/ai-docs-refresh'
        run: |
          set -euo pipefail

          # The claude-code-action wrote (or left alone) CLAUDE.md and/or
          # .github/copilot-instructions.md in the working tree. `git add -N`
          # (intent-to-add) makes newly created untracked files visible to
          # `git diff`, so a brand-new CLAUDE.md in a repo that lacked one
          # counts as drift. `git diff -w` ignores whitespace-only changes
          # so cosmetic diffs don't churn PRs.
          #
          # CHANGELOG.md is intentionally NOT part of the drift gate: the
          # prompt rule says Claude only touches CHANGELOG when it also
          # modifies an AI-docs file, so gating on AI docs alone correctly
          # suppresses spurious PRs from any stray CHANGELOG-only edits.
          for path in CLAUDE.md .github/copilot-instructions.md; do
            [ -f "${path}" ] && git add -N -- "${path}"
          done

          if git diff --quiet -w -- CLAUDE.md .github/copilot-instructions.md; then
            echo 'No substantive drift in AI assistant docs; skipping PR.'
            exit 0
          fi

          git config user.name 'rios0rios0-bot'
          git config user.email 'rios0rios0-bot@users.noreply.github.com'

          # Idempotent branch: force-push updates the diff if a PR already exists.
          git checkout -B "${BRANCH}"
          # Only add files that exist to avoid `git add` errors on repos missing either.
          [ -f CLAUDE.md ] && git add CLAUDE.md
          [ -f .github/copilot-instructions.md ] && git add .github/copilot-instructions.md
          # Pick up any CHANGELOG.md entry Claude added alongside the AI-docs refresh.
          [ -f CHANGELOG.md ] && git add CHANGELOG.md
          # If Claude deleted any of them (unexpected), stage the removal too.
          git add -u CLAUDE.md .github/copilot-instructions.md CHANGELOG.md 2>/dev/null || true
          git commit -m 'chore(ai-docs): refreshed AI assistant guidance'

          # `anthropics/claude-code-action@v1` rewrites `origin` to point at
          # `github.repository` (the workflow-hosting `fleet-maintenance` repo)
          # regardless of which repo `actions/checkout@v6` pulled. Without this
          # reset, the push lands on `rios0rios0/fleet-maintenance`, not the
          # target repo, and then `gh pr create --repo ${TARGET_REPO}` fails
          # with "No commits between main and chore/ai-docs-refresh, Head ref
          # must be a branch".
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"
          git push --force --set-upstream origin "${BRANCH}"

          if gh pr view "${BRANCH}" --repo "${TARGET_REPO}" --json number >/dev/null 2>&1; then
            echo 'PR already exists; force-push updated its diff.'
            exit 0
          fi

          gh pr create \
            --repo "${TARGET_REPO}" \
            --base "${TARGET_DEFAULT_BRANCH}" \
            --head "${BRANCH}" \
            --title 'chore(ai-docs): refresh AI assistant guidance' \
            --body $'Automated weekly refresh by `ai-docs-refresh.yaml` in `rios0rios0/fleet-maintenance`.\n\nClaude Code reviewed `CLAUDE.md` and `.github/copilot-instructions.md` against the current code, updated whichever drifted, and recorded the change in `CHANGELOG.md` (when the repo has one).\n\nReview the diff carefully — this PR was generated by Claude Code and may contain inaccuracies.'
